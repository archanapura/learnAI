# ══════════════════════════════════════════════════════════════════════════════
# Playwright E2E Tests
#
# PURPOSE:
#   Runs the full Playwright test suite against the deployed production
#   environment on every push to main. Uploads the HTML report as an artifact
#   so results can be reviewed directly in the GitHub Actions UI.
#
# TRIGGER: push to main
#
# NOTES:
#   - Tests run against https://eventhub.rahulshettyacademy.com (live site)
#   - Chromium only (as configured in playwright.config.ts)
#   - HTML report is retained for 30 days as a downloadable artifact
# ══════════════════════════════════════════════════════════════════════════════

name: Playwright E2E Tests

on:
  push:
    branches: [main]

  # Allow manual runs from the GitHub Actions UI
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '21.7.1'

jobs:

  # ╔═══════════════════════════════════════════════════════════════════════════
  # ║  Playwright Tests
  # ║  Installs dependencies, runs all specs, and uploads the HTML report.
  # ╚═══════════════════════════════════════════════════════════════════════════
  playwright:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Node.js setup ─────────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # ── Install root dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Install Playwright browsers ──────────────────────────────────────────
      # Only installs Chromium (--with-deps installs OS-level dependencies too)
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # ── Run all Playwright tests ─────────────────────────────────────────────
      # Tests run against the live site defined in playwright.config.ts.
      # --reporter=html,line gives a browsable HTML report + inline line output.
      # `|| true` ensures the artifact upload step always runs even if tests fail.
      - name: Run Playwright tests
        run: npx playwright test --reporter=html,line
        continue-on-error: true

      # ── Upload HTML report as artifact ───────────────────────────────────────
      # The report is generated in playwright-report/ by the html reporter.
      # Retained for 30 days so the team can review results after a run.
      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

          
  # ─── Upload Test Results (for retry / flakiness tracking) ───
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 7